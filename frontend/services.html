<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Services - AP Services</title>
    
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <!-- Google Fonts - Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Custom Styles -->
    <link rel="stylesheet" href="styles.css">
    
    <style>
        /* Copy your existing CSS here - keep it exactly the same */
        /* ==================== SERVICES PAGE STYLES ==================== */
        .services-page {
            background: var(--gray-50);
            min-height: calc(100vh - var(--header-height) - var(--footer-height));
            padding: var(--spacing-xl) 0;
        }

        .page-header {
            background: linear-gradient(135deg, var(--primary-600), var(--primary-800));
            color: white;
            padding: var(--spacing-2xl) 0;
            margin-bottom: var(--spacing-xl);
            border-radius: 0 0 var(--radius-2xl) var(--radius-2xl);
        }

        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: var(--spacing-lg);
            margin-top: var(--spacing-xl);
        }

        .service-card {
            background: white;
            border-radius: var(--radius-xl);
            overflow: hidden;
            box-shadow: var(--shadow-md);
            border: 1px solid var(--gray-200);
            transition: all var(--transition-base);
        }

        .service-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-xl);
            border-color: var(--primary-200);
        }

        .service-image {
            height: 160px;
            background: var(--gray-200);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--gray-500);
            font-size: 3rem;
        }

        .service-content {
            padding: var(--spacing-lg);
        }

        .service-category {
            color: var(--primary-600);
            font-weight: 600;
            font-size: var(--font-size-xs);
            text-transform: uppercase;
            margin-bottom: var(--spacing-xs);
        }

        .service-content h3 {
            font-size: 1.2rem;
            margin-bottom: var(--spacing-xs);
        }

        .service-price {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary-600);
            margin: var(--spacing-sm) 0;
        }

        .price-unit {
            font-size: var(--font-size-sm);
            font-weight: 400;
            color: var(--gray-600);
        }

        .book-btn {
            width: 100%;
            padding: 0.75rem;
            background: var(--primary-600);
            color: white;
            border: none;
            border-radius: var(--radius-lg);
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .book-btn:hover {
            background: var(--primary-700);
        }

        .loading-spinner {
            text-align: center;
            padding: 3rem;
            color: var(--gray-500);
        }

        .loading-spinner i {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .error-message {
            text-align: center;
            padding: 3rem;
            color: var(--error);
        }

        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--gray-600);
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 1rem;
        }

        .results-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 2rem 0;
        }

        .results-count strong {
            font-size: 1.2rem;
            color: var(--gray-900);
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="container">
            <div class="nav-content">
                <a href="/" class="logo">AP<span>Services</span></a>
                <div class="nav-links"></div>
                <button class="mobile-menu-btn"><i class="fas fa-bars"></i></button>
            </div>
        </div>
    </nav>

    <!-- Page Header -->
    <section class="page-header">
        <div class="container">
            <h1>Professional Services</h1>
            <p>Find trusted professionals for all your needs</p>
        </div>
    </section>

    <!-- Services Section -->
    <section class="services-page">
        <div class="container">
            <!-- Results Header -->
            <div class="results-header">
                <div class="results-count">
                    <strong id="totalCount">0</strong> services found
                </div>
            </div>

            <!-- Services Grid -->
            <div id="servicesGrid" class="services-grid">
                <div class="loading-spinner">
                    <i class="fas fa-spinner fa-spin"></i>
                    <p>Loading services...</p>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">[keep your existing footer]</footer>

    <!-- Toast Container -->
    <div id="toast" class="toast"></div>

    <!-- Load app.js -->
    <script src="app.js"></script>
    
    <script>
        // ==================== SIMPLE SERVICES LOADER ====================
        document.addEventListener('DOMContentLoaded', async function() {
            console.log('📄 Services page loaded');
            
            const servicesGrid = document.getElementById('servicesGrid');
            const totalCount = document.getElementById('totalCount');
            
            try {
                // Check if ServicesAPI exists
                if (typeof ServicesAPI === 'undefined') {
                    throw new Error('ServicesAPI not found - app.js not loaded');
                }
                
                console.log('🔍 Fetching services from API...');
                
                // Call the API
                const response = await ServicesAPI.getAll();
                console.log('✅ API Response:', response);
                
                // Get services array
                const services = response.data || [];
                console.log(`📊 Found ${services.length} services`);
                
                // Update count
                totalCount.textContent = services.length;
                
                if (services.length === 0) {
                    servicesGrid.innerHTML = `
                        <div class="empty-state">
                            <i class="fas fa-search"></i>
                            <h3>No services found</h3>
                            <p>Check back later</p>
                        </div>
                    `;
                    return;
                }
                
                // Display services
                servicesGrid.innerHTML = services.map(service => `
                    <div class="service-card">
                        <div class="service-image">
                            <i class="fas fa-${service.icon || 'tools'}"></i>
                        </div>
                        <div class="service-content">
                            <div class="service-category">${service.category || 'General'}</div>
                            <h3>${service.name}</h3>
                            <p>${service.description || 'Professional service'}</p>
                            <div class="service-price">
                                ₹${service.base_price || 0} <span class="price-unit">/${service.price_type || 'hour'}</span>
                            </div>
                            <button class="book-btn" onclick="bookService(${service.id})">
                                Book Now
                            </button>
                        </div>
                    </div>
                `).join('');
                
            } catch (error) {
                console.error('❌ Error:', error);
                
                servicesGrid.innerHTML = `
                    <div class="error-message">
                        <i class="fas fa-exclamation-triangle"></i>
                        <h3>Failed to load services</h3>
                        <p>${error.message}</p>
                        <button class="book-btn" onclick="location.reload()" style="width: auto; margin-top: 1rem;">
                            Try Again
                        </button>
                    </div>
                `;
            }
        });

        // Book service function
        window.bookService = function(serviceId) {
            const user = Auth?.getUser();
            
            if (!user) {
                Toast?.show('Please login to book', 'warning');
                window.location.href = `/login.html?redirect=${encodeURIComponent(window.location.href)}`;
                return;
            }
            
            window.location.href = `/booking.html?service=${serviceId}`;
        };
    </script>
</body>
</html>
